<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="ディスクリプション">
    <title>ToDoアプリ</title>
    <!--ページCSSの読み込み-->
    <link rel="stylesheet" href="./resources/styles/pages/index.css">
    <!--OGP設定-->
    <meta property="og:title" content="タイトル">
    <meta property="og:description" content="ディスクリプション">
    <meta property="og:image" content="画像URL">
    <meta property="og:image:secure_url" content="画像URL">
    <meta property="og:url" content="サイトURL">
    <meta property="og:site_name" content="サイト名">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:title" content="タイトル">
    <meta name="twitter:description" content="ディスクリプション">
    <meta name="twitter:image" content="画像URL">
    <meta name="twitter:card" content="summary">
    <!--favicon設定-->
    <link rel="icon" href="/favicon.ico"><!-- 32×32 -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png"><!-- 180×180 -->
    <link rel="manifest" href="/manifest.webmanifest">
    <!-- モバイルChromeのヘッダー色などで使われるテーマカラー   -->
    <meta name="theme-color" content="#fafafa">
</head>
<body>
    <h1>ToDoアプリ</h1>
    <form action="/add" method="post">
        <input type="hidden" th:name="${_csrf.parametername}" th:value="${_csrf.token}">
        <input type="text" name="title" placeholder="やることを入力" required>
        <button type="submit">追加</button>
    </form>
    <ul>
        <li th:each="todo : ${todos}">
            <span th:text="${todo.title}"></span>

            <form action="/delete" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <input type="hidden" name="id" th:value="${todo.id}">
                <button type="submit">削除</button>
            </form>
        </li>
    </ul>
    <form action="/logout" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit">ログアウト</button>
    </form>

    <li>githubのURL</li>
    <img class="qr"
        ale="QRCode">

</body>
</html>
